  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script>
  (function(){
    var body = document.body;
    var cursorDot = document.querySelector('.cursor-dot');
    var cursorOutline = document.querySelector('.cursor-outline');
    var navbar = document.getElementById('navbar');
    var progressBar = document.getElementById('progress-bar');
    var interactiveSelector = '.interactive, a, button, textarea, input, .btn';
    var prefersCoarse = window.matchMedia('(pointer: coarse)').matches;

    if (!prefersCoarse && cursorDot && cursorOutline) {
      window.addEventListener('mousemove', function(e){
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
        cursorOutline.animate(
          { left: e.clientX + 'px', top: e.clientY + 'px' },
          { duration: 500, fill: 'forwards' }
        );
      });

      document.addEventListener('mouseover', function(e){
        if (e.target.closest(interactiveSelector)) {
          body.classList.add('cursor-hover');
        }
      });

      document.addEventListener('mouseout', function(e){
        if (!e.target.closest(interactiveSelector)) {
          return;
        }
        if (!e.relatedTarget || !e.relatedTarget.closest(interactiveSelector)) {
          body.classList.remove('cursor-hover');
        }
      });
    }

    function updateChrome() {
      var scrollTop = window.scrollY || window.pageYOffset;
      if (navbar) {
        navbar.classList.toggle('nav-scrolled', scrollTop > 50);
      }
      if (progressBar) {
        var totalHeight = document.documentElement.scrollHeight - window.innerHeight;
        var width = totalHeight > 0 ? (scrollTop / totalHeight) * 100 : 0;
        progressBar.style.width = Math.max(0, Math.min(100, width)) + '%';
      }
    }

    window.addEventListener('scroll', updateChrome, { passive: true });
    window.addEventListener('resize', updateChrome);
    updateChrome();
  })();
  </script>
  <script>
  (function(){
    var WP = 'https://public-api.wordpress.com/wp/v2/sites/staysthir.wordpress.com';
    var params = new URLSearchParams(location.search);
    var slug = params.get('slug');

    var elTitle = document.getElementById('title');
    var elMeta  = document.getElementById('meta');
    var elCont  = document.getElementById('content');
    var errBox  = document.getElementById('err');

    function showError(msg){
      errBox.style.display='block';
      errBox.innerHTML='<strong>Couldn’t load post.</strong><br><small>'+msg.replace(/</g,'&lt;')+'</small>';
    }

    function loadPost(){
      if (!slug){ elTitle.textContent='Post not found'; return; }
      fetch(WP + '/posts?slug=' + encodeURIComponent(slug))
        .then(function(r){
          if(!r.ok){ return r.text().then(function(t){ throw new Error('HTTP '+r.status+' — '+t); }); }
          return r.json();
        })
        .then(function(arr){
          var p = Array.isArray(arr) ? arr[0] : null;
          if (!p){ elTitle.textContent='Post not found'; return; }
          document.title = (p.title && p.title.rendered ? p.title.rendered : 'Post') + ' — Sthir Blog';
          elTitle.innerHTML = p.title && p.title.rendered ? p.title.rendered : '(untitled)';
          elMeta.textContent = p.date ? new Date(p.date).toLocaleDateString() : '';
          elCont.innerHTML = DOMPurify.sanitize((p.content && p.content.rendered) || '', {USE_PROFILES:{html:true}});
        })
        .catch(function(err){ console.error(err); showError(err.message); });
    }

    loadPost();
  })();
  </script>
